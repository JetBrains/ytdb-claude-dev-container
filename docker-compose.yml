services:
  claude:
    build: .
    image: claude-code-autonomous:latest
    stdin_open: true
    tty: true
    # Required for Docker-in-Docker; also allows mounting the host socket
    privileged: true
    cpus: ${CPU_LIMIT:-0}
    environment:
      - GITHUB_TOKEN
      - GIT_USER_NAME
      - GIT_USER_EMAIL
      - CLAUDE_TASK
      - WORKSPACE_PATH
      - HOST_HOME
      - DNS_FIREWALL
      - EXTRA_ALLOWED_DOMAINS
      - HCLOUD_TOKEN
      - HETZNER_S3_ACCESS_KEY
      - HETZNER_S3_SECRET_KEY
      - HETZNER_S3_ENDPOINT
      - TZ
      - TERM
      - COLORTERM
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
    volumes:
      # Persistent Claude Code npm installation (survives rebuilds)
      - claude-npm:/opt/claude-npm
      # Persistent Claude Code config / conversation history
      - claude-data:/home/coder/.claude
      # Project worktree — mounted at the host absolute path so that
      # getcwd() returns paths matching git worktree metadata.
      # A /workspace symlink is created at startup for convenience.
      - ${WORKSPACE_PATH:-.}:${WORKSPACE_PATH:-/workspace}
      # Maven local repository (shared with host).
      # Mounted at the host's home path inside the container so absolute paths
      # baked into caches (e.g. Equo P2 bundle-pool used by spotless-maven-plugin)
      # resolve identically on host and in the container. The entrypoint
      # symlinks /home/coder/.m2 to this location for tools that read ~/.m2.
      - ${MAVEN_REPO:-~/.m2}:${HOST_HOME:-/home/coder}/.m2
      # Personal Claude Code skills from host (~/.claude/skills)
      - ${CLAUDE_SKILLS_PATH:-~/.claude/skills}:/home/coder/.claude/skills
      # Personal Claude Code commands from host (~/.claude/commands)
      - ${CLAUDE_COMMANDS_PATH:-~/.claude/commands}:/home/coder/.claude/commands
      # DNS firewall domain whitelist (directory mount so inode-replacing
      # edits on the host are visible immediately — file mounts go stale)
      - ./config:/opt/config:ro
      # Docker socket from host (Docker-in-Docker via socket sharing)
      - /var/run/docker.sock:/var/run/docker.sock
    # Default: idle process for multi-terminal workflow (start.sh + exec.sh)
    # Overridden by run.sh for single-terminal interactive mode
    command: ["sleep", "infinity"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Drop all incoming traffic, allow outgoing only
    networks:
      - egress-only

networks:
  egress-only:
    driver: bridge
    internal: false   # allows outbound internet
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"   # no inter-container traffic
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  claude-npm:
    name: claude-code-npm
  claude-data:
    name: claude-code-data
